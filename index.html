<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#eef4ff;
  color:#1e293b;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,0,0,0.05);
  padding:14px;
  display:flex;
  justify-content:center;
}

.header-center{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
  font-size:18px;
  color:#2563eb;
}

.cart-svg{
  width:22px;
  height:22px;
  cursor:pointer;
  transition:0.2s;
}

.cart-svg:hover{
  stroke:#1e40af;
  fill:#1e40af;
}

.banner{
  width:100%;
  height:181px;

  border:1px solid #2563eb;
  border-radius:0 0 20px 20px;

  overflow:hidden; /* tetap */
}

.slider{
  display:flex;
  height:100%;
  transition:0.5s ease;
  will-change: transform;
}

.slider img{
  width:100%;
  height:100%;
  object-fit:cover;
  flex-shrink:0;
}

/* CONTAINER */
.container{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:12px;
  text-align:center;
  box-shadow:0 8px 20px rgba(37,99,235,0.08);
  transition:0.25s;
  border:1px solid rgba(37,99,235,0.08);
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 12px 25px rgba(37,99,235,0.15);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:8px;
}

/* TEXT */
.nama{
  font-size:14px;
  font-weight:500;
}

.harga{
  color:#2563eb;
  font-weight:600;
  margin-top:3px;
}

/* BUTTON */
.btn{
  margin-top:10px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  color:white;
  padding:8px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  opacity:0.9;
}

/* SECTION */
.section-title{
  font-size:18px;
  font-weight:600;
  color:#1e3a8a;
}

.section-desc{
  font-size:13px;
  color:#64748b;
  margin-top:2px;
}

.section-line{
  height:3px;
  width:50px;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
  border-radius:10px;
  margin:8px 0 15px;
}

.section{
  grid-column:1/-1;
}

/* GRID PRODUK */
.grid-produk{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.btn:active{
  transform:scale(0.95);
}

.info-box{
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e40af;
  font-size:12px;
  padding:8px;
  border-radius:10px;
  margin-top:6px;
  text-align:left;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#64748b;
  padding:20px 10px;
  margin-top:20px;
  border-top:1px solid rgba(0,0,0,0.05);
}

.info-title{
  font-weight:600;
  font-size:13px;
  margin-bottom:4px;
}

.info-text{
  font-size:12px;
}

.slider{
  display:flex;
  height:100%;
  transition:0.5s ease;
  will-change: transform;
}

html{
  scroll-behavior: smooth;
}

.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}

.btn:hover{

.brand{

.brand-top{
  display:flex;

  font-size:18px;

}

.brand-bottom{

.server-svg{
  width:18px;
  height:18px;

  top:-1px; /* naik dikit */

.brand-bottom:hover .server-svg{
  transform:scale(1.15);

.logo-svg{

  height:18px;

.brand-bottom{
  margin-top:2px;

/* HAMBURGER */
/* =========================
   HAMBURGER PRO
========================= */
.hamburger{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);

  width:42px;
  height:42px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);

  border-radius:14px;
  border:1px solid rgba(255,255,255,0.4);

  box-shadow:
    0 8px 20px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);

  cursor:pointer;
  z-index:200;

  transition:0.3s cubic-bezier(.4,0,.2,1);
}

/* hover */
.hamburger:hover{
  transform:translateY(-50%) scale(1.06);
  box-shadow:
    0 12px 25px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.6);
}

/* garis */
.hamburger span{
  display:block;
  height:2.5px;
  width:18px;
  background:#2563eb;
  border-radius:10px;
  transition:0.4s cubic-bezier(.4,0,.2,1);
}

/* animasi jadi X */
.hamburger.active span:nth-child(1){
  transform:translateY(7px) rotate(45deg);
}

.hamburger.active span:nth-child(2){
  opacity:0;
  transform:scale(0);
}

.hamburger.active span:nth-child(3){
  transform:translateY(-7px) rotate(-45deg);
}


.menu{
  position:absolute;
  top:70px;
  left:5px;

  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;

  width:max-content;

  /* 🔥 UBAH INI */
  background:rgba(255,255,255,0.15); /* lebih transparan */

  -webkit-backdrop-filter:blur(60px) saturate(200%);

  border-radius:16px;
  border:1px solid rgba(255,255,255,0.25);

  box-shadow:

  opacity:0;
  transform:translateY(-12px) scale(0.95);
  pointer-events:none;

  transition:0.35s cubic-bezier(.4,0,.2,1);
  z-index:150;
}

.menu::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;

  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(80px);
  -webkit-backdrop-filter:blur(80px);

  z-index:-1;
}

/* muncul */
.menu.active{
  opacity:1;

}


/* =========================

========================= */
.menu-btn{

}
</style>

<script>
const nomor = "62895365649947"

const data = [
  {nama:"Panel Ram 5Gb",harga:3000,kategori:"makanan",img:"https://risrfgvolfxuavpsmfjn.supabase.co/storage/v1/object/public/uploads/1773747155318-qnx2xjo9.png"},
  
  {nama:"Reseller Panel",harga:5000,kategori:"minuman",img:"https://risrfgvolfxuavpsmfjn.supabase.co/storage/v1/object/public/uploads/1773748160406-i19ur35y.jpg"},

  {nama:"Ceo Panel",harga:10000,kategori:"minuman",img:"https://risrfgvolfxuavpsmfjn.supabase.co/storage/v1/object/public/uploads/1773776249309-nfkpzf6j.jpg"},
  
  {nama:"Panel Ram 6Gb",harga:4000,kategori:"makanan",img:"https://risrfgvolfxuavpsmfjn.supabase.co/storage/v1/object/public/uploads/1773747155318-qnx2xjo9.png"},
  {nama:"Panel Ram 7Gb",harga:5000,kategori:"makanan",img:"https://risrfgvolfxuavpsmfjn.supabase.co/storage/v1/object/public/uploads/1773747155318-qnx2xjo9.png"},
  {nama:"Panel Ram 8Gb",harga:6000,kategori:"makanan",img:"https://risrfgvolfxuavpsmfjn.supabase.co/storage/v1/object/public/uploads/1773747155318-qnx2xjo9.png"},
  {nama:"Panel Ram 9Gb",harga:7000,kategori:"makanan",img:"https://risrfgvolfxuavpsmfjn.supabase.co/storage/v1/object/public/uploads/1773747155318-qnx2xjo9.png"},
  {nama:"Panel Ram Unli",harga:8000,kategori:"makanan",img:"https://risrfgvolfxuavpsmfjn.supabase.co/storage/v1/object/public/uploads/1773747155318-qnx2xjo9.png"},
]

let kategoriAktif = "all"

function tampilProduk(){
  const container = document.getElementById("produk")
  container.innerHTML=""

  const filtered = data
  .filter(p => (kategoriAktif==="all" || p.kategori===kategoriAktif))
    

  if(kategoriAktif === "all"){

    // MAKANAN
    container.innerHTML += `
      <div class="section reveal">
        <div class="section-title">Panel Pterodactyl</div>
        <div class="section-desc">Pilih ram sesuai kebutuhanmu, jalankan bot lancar tanpa lag.</div>
        <div class="section-line"></div>

        <div class="grid-produk" id="makanan"></div>
      </div>
    `

    const makanan = document.getElementById("makanan")

    filtered
      .filter(p=>p.kategori==="makanan")
      .forEach(p=>{
        makanan.innerHTML += cardHTML(p)
      })

    // MINUMAN
    container.innerHTML += `
      <div class="section">
        <div class="section-title">Role Panel Pterodactyl</div>
        <div class="section-desc">Berbagai role panel siap dipilih sesuai keinginan.</div>
        <div class="section-line"></div>

        <div class="grid-produk" id="minuman"></div>
      </div>
    `

    const minuman = document.getElementById("minuman")

    filtered
      .filter(p=>p.kategori==="minuman")
      .forEach(p=>{
        minuman.innerHTML += cardHTML(p)
      })

  } else {

    filtered.forEach(p=>{
      container.innerHTML += cardHTML(p)
    })

  }
}

// CARD
function cardHTML(p){

  let extra = ""

  if(p.nama === "Reseller Panel"){
    extra = `
      <div class="info-box">
        <div class="info-title">Role Reseller Panel</div>
        <div class="info-text">
          
Bergabung ke grup Telegram eksklusif dan dapatkan akses untuk bebas membuat serta menjual panel. Cocok untuk kamu yang ingin mulai bisnis panel dengan mudah—tanpa perlu akses admin, tetap bisa cuan!
        </div>
      </div>
    `
  }

  if(p.nama === "Ceo Panel"){
    extra = `
      <div class="info-box">
        <div class="info-title">Role CEO Panel</div>
        <div class="info-text">
          
Dapatkan akses Admin Panel penuh dan bergabung ke grup Telegram eksklusif. Nikmati kebebasan untuk membuat dan menjual panel sesuka Anda—cocok untuk yang ingin serius membangun bisnis panel dan menghasilkan keuntungan tanpa batas.
        </div>
      </div>
    `
  }

  return `
  <div class="reveal">
    <div class="card">
      <img src="${p.img}" loading="lazy" decoding="async">
      <div class="nama">${p.nama}</div>
      <div class="harga">Rp ${p.harga.toLocaleString()}</div>
      <div class="btn" onclick="orderWA('${p.nama}',${p.harga})">
  <svg viewBox="0 0 24 24" fill="none">
    <path d="M6 8L7 20H17L18 8" stroke="white" stroke-width="2" stroke-linecap="round" />
    <path d="M9 8V6a3 3 0 0 1 6 0v2" stroke="white" stroke-width="2" />
  </svg>
  Order
</div>
    </div>

    ${extra}
  </div>`
}

// WA
function orderWA(nama,harga){
  const pesan = `Halo Nukk, saya mau order:%0A- ${nama} (Rp${harga})`
  window.open(`https://wa.me/${nomor}?text=${pesan}`)
}

// LOAD
tampilProduk()

let index = 0
const slider = document.getElementById("slider")
const total = slider.children.length

function showSlide(){
  slider.style.transform = `translateX(-${index * 100}%)`
}

// AUTO SLIDE
let auto = setInterval(()=>{
  index = (index + 1) % total
  showSlide()
}, 6000) // 10 detik


// SWIPE (GESER HP)
let startX = 0

slider.addEventListener("touchstart", (e)=>{
  startX = e.touches[0].clientX
})

slider.addEventListener("touchend", (e)=>{
  let endX = e.changedTouches[0].clientX
  let diff = startX - endX

  if(diff > 50){
    index = (index + 1) % total
  }else if(diff < -50){
    index = (index - 1 + total) % total
  }

  showSlide()

  // reset auto biar gak tabrakan
  clearInterval(auto)
  auto = setInterval(()=>{
  index = (index + 1) % total
  showSlide()
}, 6000) // 10 detik
})

function revealOnScroll(){
  const reveals = document.querySelectorAll(".reveal")

  reveals.forEach(el=>{
    const windowHeight = window.innerHeight
    const elementTop = el.getBoundingClientRect().top
    const visiblePoint = 100

    if(elementTop < windowHeight - visiblePoint){
      el.classList.add("active")
    }
  })
}

window.addEventListener("scroll", revealOnScroll)
window.addEventListener("load", revealOnScroll)
window.addEventListener("scroll", ()=>{
  const scroll = window.scrollY
  const banner = document.querySelector(".banner")

  banner.style.transform = `translateY(${scroll * 0.2}px)`
})

// kode kamu di atas

// ⬇️ TARUH DI PALING BAWAH
const hamburger = document.getElementById("hamburger")
const menu = document.getElementById("menu")

hamburger.addEventListener("click", ()=>{
  hamburger.classList.toggle("active")
  menu.classList.toggle("active")
})

</script>
